// ── MINI CHARTS (SVG nativo) ─────────────────────────────────────────────
function BarChart({data,keys,colors,height=140}){
  const [tip,setTip]=useState(null);
  const max=Math.max(...data.flatMap(d=>keys.map(k=>d[k]||0)),1);
  const W=100/data.length, bW=W*0.32;
  return(
    <div style={{position:'relative'}}>
      <svg width="100%" height={height} viewBox={`0 0 100 ${height}`} preserveAspectRatio="none">
        {data.map((d,i)=>keys.map((k,ki)=>{
          const bh=((d[k]||0)/max)*(height-20);
          const x=i*W+ki*(bW+0.5)+W*0.08;
          return <rect key={k+i} x={x} y={height-20-bh} width={bW} height={Math.max(bh,0)} fill={colors[ki]} rx="2"
            onMouseEnter={()=>setTip({i,label:d.label,vals:keys.map((k2,ki2)=>({k:k2,v:d[k2]||0,c:colors[ki2]}))})}
            onMouseLeave={()=>setTip(null)} style={{cursor:'default'}}/>;
        }))}
        {data.map((d,i)=><text key={i} x={i*W+W/2} y={height-6} textAnchor="middle" fontSize="5" fill="var(--text3)">{d.label}</text>)}
      </svg>
      {tip&&<div style={{position:'absolute',top:8,left:'50%',transform:'translateX(-50%)',background:'var(--surface)',border:'1px solid var(--border)',borderRadius:8,padding:'6px 10px',fontSize:11,pointerEvents:'none',whiteSpace:'nowrap',boxShadow:'0 4px 12px rgba(0,0,0,0.1)',zIndex:10}}>
        <div style={{fontWeight:600,marginBottom:3,color:'var(--text)'}}>{tip.label}</div>
        {tip.vals.map(v=><div key={v.k} style={{color:v.c}}>${money(v.v,0)}</div>)}
      </div>}
    </div>
  );
}
function LineChart({data,dataKey,color='var(--primary)',height=48}){
  const vals=data.map(d=>d[dataKey]||0);
  const min=Math.min(...vals),max=Math.max(...vals,min+1);
  const pts=vals.map((v,i)=>`${(i/Math.max(vals.length-1,1))*100},${height-((v-min)/(max-min))*(height-4)-2}`).join(' ');
  return(
    <svg width="100%" height={height} viewBox={`0 0 100 ${height}`} preserveAspectRatio="none">
      <defs><linearGradient id="lg" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stopColor={color} stopOpacity="0.15"/>
        <stop offset="100%" stopColor={color} stopOpacity="0"/>
      </linearGradient></defs>
      <polygon points={`0,${height} ${pts} 100,${height}`} fill="url(#lg)"/>
      <polyline points={pts} fill="none" stroke={color} strokeWidth="1.5" strokeLinejoin="round" strokeLinecap="round"/>
    </svg>
  );
}
function DonutChart({data,colors,size=100}){
  const [tip,setTip]=useState(null);
  const total=data.reduce((s,d)=>s+(d.value||0),0)||1;
  const cx=size/2,cy=size/2,r=size*0.36,ri=size*0.23;
  let angle=-Math.PI/2;
  const slices=data.map((d,i)=>{
    const sweep=(d.value/total)*Math.PI*1.98;
    const p=(a,rad)=>({x:cx+rad*Math.cos(a),y:cy+rad*Math.sin(a)});
    const a1=p(angle,r),a2=p(angle+sweep,r),b1=p(angle,ri),b2=p(angle+sweep,ri);
    const large=sweep>Math.PI?1:0;
    const path=`M${b1.x},${b1.y} L${a1.x},${a1.y} A${r},${r} 0 ${large} 1 ${a2.x},${a2.y} L${b2.x},${b2.y} A${ri},${ri} 0 ${large} 0 ${b1.x},${b1.y}`;
    angle+=sweep+0.02;
    return{path,color:colors[i%colors.length],d};
  });
  return(
    <div style={{position:'relative',display:'inline-flex',alignItems:'center',justifyContent:'center'}}>
      <svg width={size} height={size}>
        {slices.map((s,i)=><path key={i} d={s.path} fill={s.color} stroke="var(--surface)" strokeWidth="1.5"
          onMouseEnter={()=>setTip({name:s.d.name,value:s.d.value,color:s.color,pct:((s.d.value/total)*100).toFixed(0)})}
          onMouseLeave={()=>setTip(null)} style={{cursor:'default',transition:'opacity .15s'}}/>)}
      </svg>
      {tip&&<div style={{position:'absolute',top:'50%',left:'105%',transform:'translateY(-50%)',background:'var(--surface)',border:'1px solid var(--border)',borderRadius:8,padding:'6px 10px',fontSize:11,whiteSpace:'nowrap',boxShadow:'0 4px 12px rgba(0,0,0,0.12)',zIndex:10}}>
        <div style={{fontWeight:600,color:tip.color}}>{tip.name}</div>
        <div style={{color:'var(--text2)'}}>${money(tip.value,0)} · {tip.pct}%</div>
      </div>}
    </div>
  );
}

function Dashboard(){
  const [txns,setTxns]=useState([]);
  const [accs,setAccs]=useState([]);
  const [loading,setLoading]=useState(true);

  useEffect(()=>{
    (async()=>{
      const [t,a]=await Promise.all([
        sb.from('transactions').select('*,categories(name)').order('date',{ascending:false}),
        sb.from('accounts').select('*').eq('is_active',true),
      ]);
      setTxns(t.data||[]);setAccs(a.data||[]);setLoading(false);
    })();
  },[]);

  const thisMonth=new Date().toISOString().slice(0,7);
  const month=txns.filter(t=>t.date?.startsWith(thisMonth));
  const income=month.filter(t=>t.type==='income').reduce((s,t)=>s+Number(t.amount),0);
  const expenses=month.filter(t=>t.type==='expense').reduce((s,t)=>s+Number(t.amount),0);
  const savings=accs.filter(a=>a.type==='investment').reduce((s,a)=>s+Number(a.balance),0);
  const totalUSD=accs.filter(a=>a.currency==='USD').reduce((s,a)=>s+Number(a.balance),0);
  const fmtSplit=n=>{const s=money(n,2).split(',');return{int:s[0],dec:s[1]||'00'};};

  const last6=Array.from({length:6},(_,i)=>{
    const d=new Date();d.setMonth(d.getMonth()-(5-i));
    const key=d.toISOString().slice(0,7);
    const label=d.toLocaleString('es',{month:'short'});
    const inc=txns.filter(t=>t.date?.startsWith(key)&&t.type==='income').reduce((s,t)=>s+Number(t.amount),0);
    const exp=txns.filter(t=>t.date?.startsWith(key)&&t.type==='expense').reduce((s,t)=>s+Number(t.amount),0);
    return{label,income:inc,expenses:exp,net:inc-exp};
  });

  const byCat=Object.values(
    month.filter(t=>t.type==='expense').reduce((acc,t)=>{
      const n=t.categories?.name||'Otros';
      if(!acc[n])acc[n]={name:n,value:0};
      acc[n].value+=Number(t.amount);return acc;
    },{})
  ).sort((a,b)=>b.value-a.value);

  const recent=txns.slice(0,5);
  const {int:bi,dec:bd}=fmtSplit(totalUSD);
  const {int:ii,dec:id}=fmtSplit(income);
  const {int:ei,dec:ed}=fmtSplit(expenses);
  const {int:si,dec:sd}=fmtSplit(savings);

  if(loading)return<Loading/>;
  return(
    <div style={{display:'flex',flexDirection:'column',gap:16}}>
      {/* Header */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
        <div>
          <h1 style={{fontSize:22,fontWeight:700,color:'var(--text)',letterSpacing:'-0.3px'}}>Panel financiero</h1>
          <p style={{fontSize:13,color:'var(--text3)',marginTop:3}}>Es el mejor momento para gestionar tus finanzas</p>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <Pill icon={Icons.calendar}>{new Date().toLocaleString('es',{month:'long',year:'numeric'})}</Pill>
        </div>
      </div>

      {/* 4 Stat Cards */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12}}>
        <StatCard label="Balance total" value={`$${bi}`} cents={bd} trend="12.1%" trendUp/>
        <StatCard label="Ingresos del mes" value={`$${ii}`} cents={id} trend="6.3%" trendUp/>
        <StatCard label="Gastos del mes" value={`$${ei}`} cents={ed} trend="2.4%" trendUp={false}/>
        <StatCard label="Ahorros totales" value={`$${si}`} cents={sd} trend="12.1%" trendUp/>
      </div>

      {/* Charts row */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 320px',gap:12}}>
        <Card>
          <CardHeader title="Flujo de dinero" action={
            <div style={{display:'flex',gap:8,alignItems:'center'}}>
              <div style={{display:'flex',gap:10,fontSize:11,color:'var(--text3)'}}>
                <span style={{display:'flex',alignItems:'center',gap:4}}><span style={{width:7,height:7,borderRadius:2,background:'#8470FF',display:'inline-block'}}/> Ingresos</span>
                <span style={{display:'flex',alignItems:'center',gap:4}}><span style={{width:7,height:7,borderRadius:2,background:'#BFB7FF',display:'inline-block'}}/> Gastos</span>
              </div>
            </div>
          }/>
          <BarChart data={last6} keys={['income','expenses']} colors={['#8470FF','#BFB7FF']} height={140}/>
          <div style={{marginTop:10,paddingTop:10,borderTop:'1px solid var(--border)'}}>
            <div style={{fontSize:11,color:'var(--text3)',marginBottom:4}}>Tendencia flujo neto</div>
            <LineChart data={last6} dataKey="net" height={44}/>
          </div>
        </Card>
        <Card>
          <CardHeader title="Presupuesto"/>
          {byCat.length>0?<>
            <div style={{display:'flex',justifyContent:'center',marginBottom:10,position:'relative'}}>
              <DonutChart data={byCat} colors={CHART_COLORS} size={110}/>
              <div style={{position:'absolute',top:'50%',left:'50%',transform:'translate(-50%,-50%)',textAlign:'center',pointerEvents:'none'}}>
                <div style={{fontSize:9,color:'var(--text3)'}}>Total mes</div>
                <div style={{fontSize:13,fontWeight:700,color:'var(--text)'}}>${money(expenses,0)}</div>
              </div>
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:5}}>
              {byCat.slice(0,5).map((c,i)=><div key={c.name} style={{display:'flex',alignItems:'center',gap:7}}>
                <div style={{width:7,height:7,borderRadius:'50%',background:CHART_COLORS[i],flexShrink:0}}/>
                <span style={{fontSize:11,color:'var(--text2)',flex:1}}>{c.name}</span>
                <span style={{fontSize:11,fontWeight:500,color:'var(--text)'}}>${money(c.value,0)}</span>
              </div>)}
            </div>
          </>:<Empty msg="Sin gastos este mes"/>}
        </Card>
      </div>

      {/* Bottom row */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 320px',gap:12}}>
        <Card style={{padding:0,overflow:'hidden'}}>
          <div style={{padding:'16px 18px 12px',borderBottom:'1px solid var(--border)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <span style={{fontWeight:600,fontSize:14}}>Transacciones recientes</span>
            <div style={{display:'flex',gap:8}}>
              <Pill>Todas las cuentas</Pill>
              <Pill style={{color:'var(--primary)',borderColor:'var(--primary-light)',background:'var(--primary-light)'}}>Ver todo →</Pill>
            </div>
          </div>
          {recent.length===0?<Empty msg="Sin transacciones"/>:(
            <table>
              <thead>
                <tr style={{borderBottom:'1px solid var(--border)'}}>
                  {['Fecha','Monto','Descripción','Método','Categoría'].map((h,i)=>(
                    <th key={h} style={{padding:'8px 16px',textAlign:'left',fontSize:11,color:'var(--primary)',fontWeight:600,letterSpacing:'0.3px'}}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {recent.map(t=>(
                  <tr key={t.id} style={{borderBottom:'1px solid var(--border)'}}>
                    <td style={{padding:'10px 16px',fontSize:12,color:'var(--text3)',whiteSpace:'nowrap'}}>{fmt(t.date)}</td>
                    <td style={{padding:'10px 16px',fontSize:13,fontWeight:600,color:TYPE_COLORS[t.type]}}>
                      {t.type==='income'?'+':'-'}${money(t.amount,2)}
                    </td>
                    <td style={{padding:'10px 16px'}}>
                      <div style={{fontSize:13,color:'var(--text)'}}>{t.description||'—'}</div>
                      <div style={{display:'flex',gap:3,marginTop:2}}>
                        {t.is_recurring&&<span style={{fontSize:10,background:'#eff6ff',color:'#3b82f6',borderRadius:4,padding:'1px 5px'}}>Recurrente</span>}
                        {t.is_impulsive&&<span style={{fontSize:10,background:'#fff7ed',color:'#f97316',borderRadius:4,padding:'1px 5px'}}>Impulsivo</span>}
                      </div>
                    </td>
                    <td style={{padding:'10px 16px',fontSize:12,color:'var(--text3)',textTransform:'capitalize'}}>{t.payment_method||'—'}</td>
                    <td style={{padding:'10px 16px'}}><span style={{fontSize:11,background:'var(--surface2)',color:'var(--text2)',borderRadius:6,padding:'2px 8px'}}>{t.categories?.name||'—'}</span></td>
                  </tr>
                ))}
              </tbody>
            </table>
          )}
        </Card>
        <Card>
          <CardHeader title="Metas de ahorro"/>
          <GoalsMiniWidget/>
        </Card>
      </div>
    </div>
  );
}

function GoalsMiniWidget(){
  const [goals,setGoals]=useState([]);
  useEffect(()=>{sb.from('savings_goals').select('*').eq('status','active').limit(4).then(r=>setGoals(r.data||[]));},[]);
  if(!goals.length)return<Empty msg="Sin metas activas"/>;
  return<div style={{display:'flex',flexDirection:'column',gap:12}}>
    {goals.map((g,i)=>{
      const pct=g.target_amount>0?Math.min((Number(g.current_amount)/Number(g.target_amount))*100,100):0;
      return<div key={g.id}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:5}}>
          <span style={{fontSize:13,fontWeight:500,color:'var(--text)'}}>{g.name}</span>
          <span style={{fontSize:12,color:'var(--primary)',fontWeight:600}}>${money(g.target_amount,0)}</span>
        </div>
        <div style={{height:6,background:'var(--surface2)',borderRadius:99,overflow:'hidden'}}>
          <div style={{height:6,width:`${pct}%`,background:CHART_COLORS[i%CHART_COLORS.length],borderRadius:99,transition:'width .5s'}}/>
        </div>
        <div style={{display:'flex',justifyContent:'space-between',marginTop:3}}>
          <span style={{fontSize:10,color:'var(--text3)'}}>{pct.toFixed(0)}% completado</span>
          <span style={{fontSize:10,color:'var(--text3)'}}>${money(g.current_amount,0)} ahorrado</span>
        </div>
      </div>;
    })}
  </div>;
}

// TRANSACCIONES
// ══════════════════════════════════════════════════════════════════════════
function TxModal({accounts,categories,onClose,onSave}){
  const [type,setType]=useState('expense');
  const [amount,setAmount]=useState('');
  const [accountId,setAccountId]=useState(accounts[0]?.id||'');
  const [categoryId,setCategoryId]=useState('');
  const [date,setDate]=useState(localToday());
  const [method,setMethod]=useState('cash');
  const [desc,setDesc]=useState('');
  const [recurring,setRecurring]=useState(false);
  const [impulsive,setImpulsive]=useState(false);
  const [saving,setSaving]=useState(false);
  const ref=useRef(false);

  const save=async()=>{
    if(ref.current||!amount||!accountId)return;
    ref.current=true;setSaving(true);
    await sb.from('transactions').insert({account_id:accountId,category_id:categoryId||null,amount:parseFloat(amount),type,date,description:desc,payment_method:method,is_recurring:recurring,is_impulsive:impulsive});
    ref.current=false;setSaving(false);onSave();
  };
  const cats=categories.filter(c=>c.type===type||type==='transfer');
  return(
    <Modal onClose={onClose} title="Nueva transacción">
      <div style={{display:'flex',gap:6,marginBottom:16}}>
        {['expense','income','transfer'].map(t=>(
          <button key={t} onClick={()=>setType(t)} style={{flex:1,padding:'7px 0',borderRadius:99,fontSize:12,fontWeight:500,cursor:'pointer',border:'none',background:type===t?TYPE_COLORS[t]:'var(--surface2)',color:type===t?'#fff':'var(--text2)',transition:'all .15s'}}>
            {TYPE_LABELS[t]}
          </button>
        ))}
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:12}}>
        <Field label="Monto"><Input type="number" step="0.01" placeholder="0.00" value={amount} onChange={e=>setAmount(e.target.value)}/></Field>
        <Field label="Cuenta"><Select value={accountId} onChange={e=>setAccountId(e.target.value)}>{accounts.map(a=><option key={a.id} value={a.id}>{a.name} — {a.currency}</option>)}</Select></Field>
        <Field label="Categoría"><Select value={categoryId} onChange={e=>setCategoryId(e.target.value)}><option value="">Sin categoría</option>{cats.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}</Select></Field>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
          <Field label="Fecha"><Input type="date" value={date} onChange={e=>setDate(e.target.value)}/></Field>
          <Field label="Método"><Select value={method} onChange={e=>setMethod(e.target.value)}>
            <option value="cash">Efectivo</option><option value="debit">Débito</option>
            <option value="credit">Crédito</option><option value="transfer">Transferencia</option>
            <option value="digital">Digital</option><option value="other">Otro</option>
          </Select></Field>
        </div>
        <Field label="Descripción (opcional)"><Input value={desc} onChange={e=>setDesc(e.target.value)} placeholder="Ej: Supermercado"/></Field>
        <div style={{display:'flex',gap:20}}>
          <label style={{display:'flex',alignItems:'center',gap:7,fontSize:13,cursor:'pointer',color:'var(--text2)'}}><input type="checkbox" checked={recurring} onChange={e=>setRecurring(e.target.checked)}/>Recurrente</label>
          <label style={{display:'flex',alignItems:'center',gap:7,fontSize:13,cursor:'pointer',color:'var(--text2)'}}><input type="checkbox" checked={impulsive} onChange={e=>setImpulsive(e.target.checked)}/>Impulsivo</label>
        </div>
      </div>
      <ModalFooter onClose={onClose} onSave={save} saving={saving} saveLabel="Registrar"/>
    </Modal>
  );
}

function Transacciones(){
  const [txns,setTxns]=useState([]);
  const [accounts,setAccounts]=useState([]);
  const [categories,setCategories]=useState([]);
  const [loading,setLoading]=useState(true);
  const [showModal,setShowModal]=useState(false);
  const [filter,setFilter]=useState({type:'all',account:'all',search:''});

  const load=async()=>{
    setLoading(true);
    const [t,a,c]=await Promise.all([
      sb.from('transactions').select('*,accounts(name,currency),categories(name)').order('date',{ascending:false}).limit(200),
      sb.from('accounts').select('*').eq('is_active',true),
      sb.from('categories').select('*').order('name'),
    ]);
    setTxns(t.data||[]);setAccounts(a.data||[]);setCategories(c.data||[]);setLoading(false);
  };
  useEffect(()=>{load();},[]);

  const filtered=txns.filter(t=>{
    if(filter.type!=='all'&&t.type!==filter.type)return false;
    if(filter.account!=='all'&&t.account_id!==filter.account)return false;
    if(filter.search&&!t.description?.toLowerCase().includes(filter.search.toLowerCase()))return false;
    return true;
  });
  const income=txns.filter(t=>t.type==='income').reduce((s,t)=>s+Number(t.amount),0);
  const expense=txns.filter(t=>t.type==='expense').reduce((s,t)=>s+Number(t.amount),0);

  const del=async id=>{if(!window.confirm('¿Eliminar?'))return;await sb.from('transactions').delete().eq('id',id);load();};

  return(
    <div style={{display:'flex',flexDirection:'column',gap:16}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
        <div><h1 style={{fontSize:20,fontWeight:700,letterSpacing:'-0.3px'}}>Transacciones</h1><p style={{fontSize:13,color:'var(--text3)',marginTop:3}}>Historial completo de movimientos</p></div>
        <Btn icon={Icons.plus} onClick={()=>setShowModal(true)}>Nueva transacción</Btn>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:12}}>
        <StatCard label="Ingresos totales" value={`+$${money(income,2).split(',')[0]}`} cents={money(income,2).split(',')[1]||'00'} trendUp/>
        <StatCard label="Gastos totales" value={`-$${money(expense,2).split(',')[0]}`} cents={money(expense,2).split(',')[1]||'00'} trendUp={false}/>
        <StatCard label="Flujo neto" value={`$${money(income-expense,2).split(',')[0]}`} cents={money(income-expense,2).split(',')[1]||'00'} trendUp={income>=expense}/>
      </div>
      <Card style={{display:'flex',gap:10,flexWrap:'wrap',alignItems:'center'}}>
        <div style={{position:'relative',flex:'1 1 200px'}}>
          <span style={{position:'absolute',left:10,top:'50%',transform:'translateY(-50%)',color:'var(--text3)',display:'flex'}}>{Icons.search}</span>
          <Input placeholder="Buscar por descripción..." value={filter.search} onChange={e=>setFilter(f=>({...f,search:e.target.value}))} style={{paddingLeft:32}}/>
        </div>
        <Select value={filter.type} onChange={e=>setFilter(f=>({...f,type:e.target.value}))} style={{width:'auto'}}>
          <option value="all">Todos los tipos</option><option value="income">Ingresos</option>
          <option value="expense">Gastos</option><option value="transfer">Transferencias</option>
        </Select>
        <Select value={filter.account} onChange={e=>setFilter(f=>({...f,account:e.target.value}))} style={{width:'auto'}}>
          <option value="all">Todas las cuentas</option>
          {accounts.map(a=><option key={a.id} value={a.id}>{a.name}</option>)}
        </Select>
      </Card>
      <Card style={{padding:0,overflow:'hidden'}}>
        {loading?<Loading/>:filtered.length===0?<Empty msg="No hay transacciones"/>:(
          <div style={{overflowX:'auto'}}>
            <table style={{minWidth:720}}>
              <thead>
                <tr style={{borderBottom:'1px solid var(--border)'}}>
                  {['Fecha','Monto','Descripción','Cuenta','Categoría','Método',''].map((h,i)=>(
                    <th key={i} style={{padding:'10px 16px',textAlign:'left',fontSize:11,color:'var(--primary)',fontWeight:600,letterSpacing:'0.3px'}}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {filtered.map(t=>(
                  <tr key={t.id} style={{borderBottom:'1px solid var(--border)'}}>
                    <td style={{padding:'10px 16px',fontSize:12,color:'var(--text3)',whiteSpace:'nowrap'}}>{fmt(t.date)}</td>
                    <td style={{padding:'10px 16px'}}>
                      <span style={{fontSize:13,fontWeight:600,color:TYPE_COLORS[t.type],background:TYPE_BG[t.type],borderRadius:6,padding:'3px 8px'}}>
                        {t.type==='income'?'+':'-'}${money(t.amount,2)}
                      </span>
                    </td>
                    <td style={{padding:'10px 16px'}}>
                      <div style={{fontSize:13,color:'var(--text)'}}>{t.description||'—'}</div>
                      <div style={{display:'flex',gap:3,marginTop:2}}>
                        {t.is_recurring&&<span style={{fontSize:10,background:'#eff6ff',color:'#3b82f6',borderRadius:4,padding:'1px 5px'}}>Recurrente</span>}
                        {t.is_impulsive&&<span style={{fontSize:10,background:'#fff7ed',color:'#f97316',borderRadius:4,padding:'1px 5px'}}>Impulsivo</span>}
                      </div>
                    </td>
                    <td style={{padding:'10px 16px'}}>
                      <div style={{display:'flex',alignItems:'center',gap:6}}>
                        <div style={{width:6,height:6,borderRadius:'50%',background:TYPE_COLORS[t.type]}}/>
                        <span style={{fontSize:12,color:'var(--text2)'}}>{t.accounts?.name}</span>
                      </div>
                    </td>
                    <td style={{padding:'10px 16px'}}><span style={{fontSize:11,background:'var(--surface2)',color:'var(--text2)',borderRadius:6,padding:'2px 8px'}}>{t.categories?.name||'—'}</span></td>
                    <td style={{padding:'10px 16px',fontSize:12,color:'var(--text3)',textTransform:'capitalize'}}>{t.payment_method||'—'}</td>
                    <td style={{padding:'10px 16px',textAlign:'right'}}>
                      <button onClick={()=>del(t.id)} style={{color:'var(--danger)',fontSize:11,cursor:'pointer',background:'none',border:'none',opacity:0.7}}>{Icons.trash}</button>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )}
      </Card>
      {showModal&&<TxModal accounts={accounts} categories={categories} onClose={()=>setShowModal(false)} onSave={()=>{setShowModal(false);load();}}/>}
    </div>
  );
}

// CUENTAS
// ══════════════════════════════════════════════════════════════════════════
function AccModal({account,onClose,onSave}){
  const [form,setForm]=useState(account||{name:'',type:'bank',balance:'',currency:'USD',description:'',is_active:true,logo_url:''});
  const [loading,setLoading]=useState(false);
  const [uploading,setUploading]=useState(false);
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));
  const handleLogo=async e=>{
    const file=e.target.files[0];if(!file)return;
    setUploading(true);
    const name=`logos/${Date.now()}.${file.name.split('.').pop()}`;
    const {error}=await sb.storage.from('account-logos').upload(name,file,{upsert:true});
    if(!error){const {data}=sb.storage.from('account-logos').getPublicUrl(name);set('logo_url',data.publicUrl);}
    setUploading(false);
  };
  const submit=async()=>{
    setLoading(true);
    const p={name:form.name,type:form.type,balance:parseFloat(form.balance)||0,currency:form.currency,description:form.description,is_active:form.is_active,logo_url:form.logo_url||null};
    if(account?.id){await sb.from('accounts').update(p).eq('id',account.id);}
    else{await sb.from('accounts').insert(p);}
    setLoading(false);onSave();
  };
  return(
    <Modal onClose={onClose} title={account?'Editar cuenta':'Nueva cuenta'}>
      <div style={{display:'flex',flexDirection:'column',gap:12}}>
        <Field label="Nombre"><Input value={form.name} onChange={e=>set('name',e.target.value)} placeholder="Ej: MercadoPago"/></Field>
        <Field label="Tipo"><Select value={form.type} onChange={e=>set('type',e.target.value)}>
          <option value="bank">Banco</option><option value="cash">Efectivo</option>
          <option value="digital_wallet">Billetera digital</option><option value="investment">Inversión / Cripto</option><option value="other">Otro</option>
        </Select></Field>
        <div style={{display:'grid',gridTemplateColumns:'1fr 100px',gap:10}}>
          <Field label="Saldo"><Input type="number" value={form.balance} onChange={e=>set('balance',e.target.value)} placeholder="0.00"/></Field>
          <Field label="Moneda"><Select value={form.currency} onChange={e=>set('currency',e.target.value)}>
            <option value="USD">USD</option><option value="ARS">ARS</option><option value="EUR">EUR</option>
            <option value="USDT">USDT</option><option value="ETH">ETH</option><option value="BTC">BTC</option>
          </Select></Field>
        </div>
        <Field label="Descripción (opcional)"><Input value={form.description} onChange={e=>set('description',e.target.value)} placeholder="Ej: Cuenta corporativa"/></Field>
        <Field label="Logo (opcional)">
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            {form.logo_url&&<img src={form.logo_url} alt="logo" style={{width:36,height:36,borderRadius:8,objectFit:'contain',border:'1px solid var(--border)'}}/>}
            <label style={{cursor:'pointer',fontSize:12,color:'var(--primary)',border:'1px solid var(--primary-light)',background:'var(--primary-light)',borderRadius:8,padding:'6px 12px'}}>
              {uploading?'Subiendo...':'Subir imagen'}<input type="file" accept="image/*" style={{display:'none'}} onChange={handleLogo}/>
            </label>
          </div>
        </Field>
        {account&&<label style={{display:'flex',alignItems:'center',gap:8,fontSize:13,cursor:'pointer',color:'var(--text2)'}}>
          <input type="checkbox" checked={form.is_active} onChange={e=>set('is_active',e.target.checked)}/> Cuenta activa
        </label>}
      </div>
      <ModalFooter onClose={onClose} onSave={submit} saving={loading} saveLabel={account?'Guardar cambios':'Crear cuenta'}/>
    </Modal>
  );
}

function AccCard({account,onEdit,onDelete}){
  const gradient=ACC_GRADIENTS[account.type]||ACC_GRADIENTS.other;
  const initials=account.name.slice(0,2).toUpperCase();
  const del=async()=>{if(!window.confirm('¿Eliminar esta cuenta?'))return;await sb.from('accounts').delete().eq('id',account.id);onDelete();};
  return(
    <div style={{borderRadius:18,overflow:'hidden',boxShadow:'0 8px 24px rgba(0,0,0,0.12)'}}>

function BudgetModal({budget,categories,onClose,onSave}){
  const [form,setForm]=useState(budget||{category_id:categories[0]?.id||'',amount_planned:'',month:new Date().toISOString().slice(0,7)+'-01'});
  const [loading,setLoading]=useState(false);
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));
  const submit=async()=>{
    setLoading(true);
    const p={category_id:form.category_id,amount_planned:parseFloat(form.amount_planned),month:form.month};
    if(budget?.id){await sb.from('budgets').update(p).eq('id',budget.id);}
    else{await sb.from('budgets').insert(p);}
    setLoading(false);onSave();
  };
  return(
    <Modal onClose={onClose} title={budget?'Editar presupuesto':'Nuevo presupuesto'} maxWidth={380}>
      <div style={{display:'flex',flexDirection:'column',gap:12}}>
        <Field label="Categoría"><Select value={form.category_id} onChange={e=>set('category_id',e.target.value)}>{categories.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}</Select></Field>
        <Field label="Monto planificado (USD)"><Input type="number" value={form.amount_planned} onChange={e=>set('amount_planned',e.target.value)} placeholder="0.00"/></Field>
        <Field label="Mes"><Input type="month" value={form.month?.slice(0,7)} onChange={e=>set('month',e.target.value+'-01')}/></Field>
      </div>
      <ModalFooter onClose={onClose} onSave={submit} saving={loading} saveLabel={budget?'Guardar':'Crear'}/>
    </Modal>
  );
}

function Presupuestos(){
  const [budgets,setBudgets]=useState([]);
  const [categories,setCategories]=useState([]);
  const [transactions,setTransactions]=useState([]);
  const [loading,setLoading]=useState(true);
  const [modal,setModal]=useState(null);
  const [month,setMonth]=useState(new Date().toISOString().slice(0,7));
  const load=async()=>{
    setLoading(true);
    const [b,c,t]=await Promise.all([
      sb.from('budgets').select('*,categories(name)').order('month',{ascending:false}),
      sb.from('categories').select('*').eq('type','expense').order('name'),
      sb.from('transactions').select('*').eq('type','expense'),
    ]);
    setBudgets(b.data||[]);setCategories(c.data||[]);setTransactions(t.data||[]);setLoading(false);
  };
  useEffect(()=>{load();},[]);
  const SC={ok:'var(--success)',warning:'var(--warning)',exceeded:'var(--danger)'};
  const SB={ok:'var(--success-bg)',warning:'var(--warning-bg)',exceeded:'var(--danger-bg)'};
  const SL={ok:'OK',warning:'Cerca del límite',exceeded:'Superado'};
  const enriched=budgets.filter(b=>b.month?.startsWith(month)).map(b=>{
    const spent=transactions.filter(t=>t.category_id===b.category_id&&t.date?.startsWith(month)).reduce((s,t)=>s+Number(t.amount),0);
    const pct=b.amount_planned>0?Math.min((spent/b.amount_planned)*100,100):0;
    const status=spent>=b.amount_planned?'exceeded':spent>=b.amount_planned*0.85?'warning':'ok';
    return{...b,spent,pct,status};
  });
  const totalP=enriched.reduce((s,b)=>s+b.amount_planned,0);
  const totalS=enriched.reduce((s,b)=>s+b.spent,0);
  const del=async id=>{if(!window.confirm('¿Eliminar?'))return;await sb.from('budgets').delete().eq('id',id);load();};
  return(
    <div style={{display:'flex',flexDirection:'column',gap:16}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
        <div><h1 style={{fontSize:20,fontWeight:700,letterSpacing:'-0.3px'}}>Presupuestos</h1><p style={{fontSize:13,color:'var(--text3)',marginTop:3}}>Control de gasto planificado vs real</p></div>
        <div style={{display:'flex',gap:10,alignItems:'center'}}>
          <Input type="month" value={month} onChange={e=>setMonth(e.target.value)} style={{width:'auto',padding:'7px 12px'}}/>
          <Btn icon={Icons.plus} onClick={()=>setModal('new')}>Nuevo presupuesto</Btn>
        </div>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12}}>
        <StatCard label="Total planificado" value={`$${money(totalP,2).split(',')[0]}`} cents={money(totalP,2).split(',')[1]||'00'}/>
        <StatCard label="Total gastado" value={`$${money(totalS,2).split(',')[0]}`} cents={money(totalS,2).split(',')[1]||'00'} trendUp={totalS<=totalP}/>
        <StatCard label="Disponible" value={`$${money(totalP-totalS,2).split(',')[0]}`} cents={money(totalP-totalS,2).split(',')[1]||'00'} trendUp={totalP>=totalS}/>
        <StatCard label="Alertas" value={enriched.filter(b=>b.status!=='ok').length} cents="00"/>
      </div>
      {loading?<Loading/>:enriched.length===0?
        <Card><Empty msg="No hay presupuestos para este mes" action={<button onClick={()=>setModal('new')} style={{color:'var(--primary)',fontSize:13,cursor:'pointer',background:'none',border:'none',fontWeight:500}}>+ Crear el primero</button>}/></Card>:
        <div style={{display:'flex',flexDirection:'column',gap:10}}>
          {enriched.map(b=><Card key={b.id}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:12}}>
              <div>
                <div style={{fontWeight:600,fontSize:14,color:'var(--text)'}}>{b.categories?.name}</div>
                <span style={{fontSize:11,fontWeight:500,color:SC[b.status],background:SB[b.status],borderRadius:99,padding:'2px 8px',marginTop:4,display:'inline-block'}}>{SL[b.status]}</span>
              </div>
              <div style={{display:'flex',alignItems:'center',gap:12}}>
                <div style={{textAlign:'right'}}>
                  <div style={{fontSize:14,fontWeight:600,color:'var(--text)'}}>${money(b.spent,2)} <span style={{color:'var(--text3)',fontWeight:400}}>/ ${money(b.amount_planned,2)}</span></div>
                  <div style={{fontSize:11,color:'var(--text3)'}}>{b.pct.toFixed(0)}% ejecutado</div>
                </div>
                <button onClick={()=>setModal(b)} style={{fontSize:12,color:'var(--primary)',cursor:'pointer',background:'none',border:'none',fontWeight:500}}>Editar</button>
                <button onClick={()=>del(b.id)} style={{fontSize:12,color:'var(--danger)',cursor:'pointer',background:'none',border:'none'}}>{Icons.trash}</button>
              </div>
            </div>
            <div style={{height:7,background:'var(--surface2)',borderRadius:99,overflow:'hidden'}}>
              <div style={{height:7,width:`${b.pct}%`,background:SC[b.status],borderRadius:99,transition:'width .5s'}}/>
            </div>
            {b.status==='exceeded'&&<div style={{marginTop:6,fontSize:12,color:'var(--danger)'}}>Superaste el presupuesto por ${money(b.spent-b.amount_planned,2)}</div>}
            {b.status==='warning'&&<div style={{marginTop:6,fontSize:12,color:'var(--warning)'}}>Te quedan ${money(b.amount_planned-b.spent,2)} disponibles</div>}
          </Card>)}
        </div>}
      {modal&&<BudgetModal budget={modal==='new'?null:modal} categories={categories} onClose={()=>setModal(null)} onSave={()=>{setModal(null);load();}}/>}
    </div>
  );
}

function GoalModal({goal,onClose,onSave}){

  const [loading,setLoading]=useState(false);
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));
  const submit=async()=>{
    setLoading(true);
    const p={name:form.name,target_amount:parseFloat(form.target_amount),current_amount:parseFloat(form.current_amount)||0,target_date:form.target_date||null,status:form.status};
    if(goal?.id){await sb.from('savings_goals').update(p).eq('id',goal.id);}
    else{await sb.from('savings_goals').insert(p);}
    setLoading(false);onSave();
  };
  return(
    <Modal onClose={onClose} title={goal?'Editar meta':'Nueva meta'} maxWidth={380}>

          <Field label="Objetivo (USD)"><Input type="number" value={form.target_amount} onChange={e=>set('target_amount',e.target.value)} placeholder="0.00"/></Field>
          <Field label="Ahorrado"><Input type="number" value={form.current_amount} onChange={e=>set('current_amount',e.target.value)} placeholder="0.00"/></Field>
        </div>

        </Select></Field>}

function AddSavingsModal({goal,onClose,onSave}){
  const [amount,setAmount]=useState('');
  const [loading,setLoading]=useState(false);
  const submit=async()=>{
    setLoading(true);
    const newAmt=Number(goal.current_amount)+parseFloat(amount);
    const status=newAmt>=Number(goal.target_amount)?'completed':'active';
    await sb.from('savings_goals').update({current_amount:newAmt,status}).eq('id',goal.id);
    setLoading(false);onSave();
  };
  return(
    <Modal onClose={onClose} title="Agregar ahorro" maxWidth={360}>
      <p style={{fontSize:13,color:'var(--text2)',marginBottom:14}}>Meta: <strong style={{color:'var(--text)'}}>{goal.name}</strong></p>
      <Field label="Monto (USD)"><Input type="number" value={amount} onChange={e=>setAmount(e.target.value)} placeholder="0.00" autoFocus/></Field>
      <ModalFooter onClose={onClose} onSave={submit} saving={loading} saveLabel="+ Agregar" saveVariant="success"/>
    </Modal>
  );
}

function Metas(){
  const [goals,setGoals]=useState([]);
  const [loading,setLoading]=useState(true);
  const [modal,setModal]=useState(null);
  const [addSavings,setAddSavings]=useState(null);
  const [filter,setFilter]=useState('active');
  const load=async()=>{setLoading(true);const {data}=await sb.from('savings_goals').select('*').order('created_at',{ascending:false});setGoals(data||[]);setLoading(false);};
  useEffect(()=>{load();},[]);
  const del=async id=>{if(!window.confirm('¿Eliminar?'))return;await sb.from('savings_goals').delete().eq('id',id);load();};
  const filtered=goals.filter(g=>filter==='all'?true:g.status===filter);
  const totalGoal=goals.filter(g=>g.status==='active').reduce((s,g)=>s+Number(g.target_amount),0);
  const totalSaved=goals.filter(g=>g.status==='active').reduce((s,g)=>s+Number(g.current_amount),0);
  const completed=goals.filter(g=>g.status==='completed').length;
  const SC={active:'var(--primary)',completed:'var(--success)',cancelled:'var(--text3)'};
  const SB={active:'var(--primary-light)',completed:'var(--success-bg)',cancelled:'var(--surface2)'};
  const SL={active:'Activa',completed:'Completada',cancelled:'Cancelada'};
  return(
    <div style={{display:'flex',flexDirection:'column',gap:16}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
        <div><h1 style={{fontSize:20,fontWeight:700,letterSpacing:'-0.3px'}}>Metas de ahorro</h1><p style={{fontSize:13,color:'var(--text3)',marginTop:3}}>Tus objetivos financieros</p></div>
        <Btn icon={Icons.plus} onClick={()=>setModal('new')}>Nueva meta</Btn>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:12}}>
        <StatCard label="Total por alcanzar" value={`$${money(totalGoal,2).split(',')[0]}`} cents={money(totalGoal,2).split(',')[1]||'00'}/>
        <StatCard label="Total ahorrado" value={`$${money(totalSaved,2).split(',')[0]}`} cents={money(totalSaved,2).split(',')[1]||'00'} trendUp/>
        <StatCard label="Metas completadas" value={String(completed)} cents="00" trendUp/>
      </div>
      <div style={{display:'flex',gap:8}}>
        {[['active','Activas'],['completed','Completadas'],['all','Todas']].map(([v,l])=>(
          <Pill key={v} onClick={()=>setFilter(v)} active={filter===v}>{l}</Pill>
        ))}
      </div>
      {loading?<Loading/>:filtered.length===0?
        <Card><Empty msg="No hay metas" action={<button onClick={()=>setModal('new')} style={{color:'var(--primary)',fontSize:13,cursor:'pointer',background:'none',border:'none',fontWeight:500}}>+ Crear una meta</button>}/></Card>:
        <div style={{display:'flex',flexDirection:'column',gap:10}}>
          {filtered.map((g,gi)=>{
            const pct=g.target_amount>0?Math.min((Number(g.current_amount)/Number(g.target_amount))*100,100):0;
            const remaining=Number(g.target_amount)-Number(g.current_amount);
            const daysLeft=g.target_date?Math.max(0,Math.ceil((new Date(g.target_date)-new Date())/86400000)):null;
            return(
              <Card key={g.id}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:12}}>
                  <div>
                    <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:4}}>
                      <span style={{fontWeight:600,fontSize:14,color:'var(--text)'}}>{g.name}</span>
                      <span style={{fontSize:10,borderRadius:99,padding:'2px 8px',background:SB[g.status],color:SC[g.status],fontWeight:500}}>{SL[g.status]}</span>
                    </div>
                    {g.target_date&&daysLeft!==null&&<div style={{fontSize:11,color:'var(--text3)'}}>
                      {daysLeft===0?'Vence hoy':`${daysLeft} días restantes`} · {new Date(g.target_date).toLocaleDateString('es-AR')}
                    </div>}
                  </div>
                  <div style={{display:'flex',alignItems:'center',gap:10}}>
                    <div style={{textAlign:'right'}}>
                      <div style={{fontSize:14,fontWeight:600,color:'var(--text)'}}>${money(g.current_amount,2)} <span style={{color:'var(--text3)',fontWeight:400}}>/ ${money(g.target_amount,2)}</span></div>
                      <div style={{fontSize:11,color:'var(--text3)'}}>{pct.toFixed(0)}% completado</div>
                    </div>
                    {g.status==='active'&&<button onClick={()=>setAddSavings(g)} style={{fontSize:11,background:'var(--success-bg)',color:'var(--success)',borderRadius:8,padding:'4px 8px',border:'none',cursor:'pointer',fontWeight:600}}>+ Agregar</button>}
                    <button onClick={()=>setModal(g)} style={{fontSize:12,color:'var(--primary)',cursor:'pointer',background:'none',border:'none',fontWeight:500}}>Editar</button>
                    <button onClick={()=>del(g.id)} style={{color:'var(--danger)',cursor:'pointer',background:'none',border:'none',display:'flex'}}>{Icons.trash}</button>
                  </div>
                </div>
                <div style={{height:7,background:'var(--surface2)',borderRadius:99,overflow:'hidden'}}>
                  <div style={{height:7,width:`${pct}%`,background:CHART_COLORS[gi%CHART_COLORS.length],borderRadius:99,transition:'width .5s'}}/>
                </div>
                {g.status==='active'&&remaining>0&&<div style={{marginTop:5,fontSize:11,color:'var(--text3)'}}>Faltan ${money(remaining,2)} para completar</div>}
                {g.status==='completed'&&<div style={{marginTop:5,fontSize:11,color:'var(--success)',fontWeight:500}}>🎉 Meta alcanzada</div>}
              </Card>
            );
          })}
        </div>}
      {modal&&<GoalModal goal={modal==='new'?null:modal} onClose={()=>setModal(null)} onSave={()=>{setModal(null);load();}}/>}
      {addSavings&&<AddSavingsModal goal={addSavings} onClose={()=>setAddSavings(null)} onSave={()=>{setAddSavings(null);load();}}/>}
    </div>
  );
}

// ASISTENTE IA
// ══════════════════════════════════════════════════════════════════════════
function Asistente(){
  const [messages,setMessages]=useState([{role:'assistant',content:'¡Hola! Soy tu asistente financiero personal. Podés preguntarme sobre tus gastos, ingresos, presupuestos o metas de ahorro.'}]);
  const [input,setInput]=useState('');
  const [loading,setLoading]=useState(false);
  const [context,setContext]=useState(null);
  const endRef=useRef(null);
  const [apiKey,setApiKey]=useState(getAnthropicKey());
  const [keyInput,setKeyInput]=useState('');

  const saveKey=()=>{if(!keyInput.trim())return;localStorage.setItem('anthropic_api_key',keyInput.trim());setApiKey(keyInput.trim());setKeyInput('');};
  const clearKey=()=>{localStorage.removeItem('anthropic_api_key');setApiKey('');};

  useEffect(()=>{endRef.current?.scrollIntoView({behavior:'smooth'});},[messages]);
  useEffect(()=>{
    if(!apiKey)return;
    (async()=>{
      const thisMonth=new Date().toISOString().slice(0,7);
      const [t,a,b,g]=await Promise.all([
        sb.from('transactions').select('*,accounts(name),categories(name)').order('date',{ascending:false}).limit(50),
        sb.from('accounts').select('*').eq('is_active',true),
        sb.from('budgets').select('*,categories(name)').gte('month',thisMonth+'-01'),
        sb.from('savings_goals').select('*').eq('status','active'),
      ]);
      const txns=t.data||[];
      const income=txns.filter(x=>x.type==='income'&&x.date?.startsWith(thisMonth)).reduce((s,x)=>s+Number(x.amount),0);
      const expenses=txns.filter(x=>x.type==='expense'&&x.date?.startsWith(thisMonth)).reduce((s,x)=>s+Number(x.amount),0);
      setContext({accounts:a.data,transactions:txns,budgets:b.data,goals:g.data,income,expenses,thisMonth});
    })();
  },[apiKey]);

  if(!apiKey)return(
    <div style={{display:'flex',flexDirection:'column',gap:16}}>

          <Btn onClick={saveKey} disabled={!keyInput.trim()}>Guardar</Btn>

    setMessages(newMsgs);setInput('');setLoading(true);

Datos del usuario:
- Mes: ${context.thisMonth} | Ingresos: $${context.income?.toFixed(2)} | Gastos: $${context.expenses?.toFixed(2)} | Neto: $${(context.income-context.expenses)?.toFixed(2)}
- Cuentas: ${context.accounts?.map(a=>`${a.name}(${a.balance} ${a.currency})`).join(', ')}
- Últimas txns: ${context.transactions?.slice(0,8).map(t=>`${t.date}: ${t.type==='income'?'+':'-'}$${t.amount} ${t.description||''} (${t.categories?.name||''})`).join(' | ')}
- Presupuestos: ${context.budgets?.map(b=>`${b.categories?.name}: $${b.amount_planned}`).join(', ')||'Ninguno'}
- Metas: ${context.goals?.map(g=>`${g.name}: $${g.current_amount}/$${g.target_amount}`).join(', ')||'Ninguna'}`
:'Sos un asistente financiero. Respondé en español.';
    try{
      const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-beta':'cors-support-1'},body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:1000,system:sys,messages:newMsgs.map(m=>({role:m.role,content:m.content}))})});
      const data=await res.json();
      setMessages(m=>[...m,{role:'assistant',content:data.content?.[0]?.text||'No pude responder. Intentá de nuevo.'}]);
    }catch(e){setMessages(m=>[...m,{role:'assistant',content:'Error de conexión.'}]);}

  return(
    <div style={{display:'flex',flexDirection:'column',gap:16,height:'calc(100vh - 110px)'}}>

        <button onClick={clearKey} style={{fontSize:11,color:'var(--text3)',cursor:'pointer',background:'none',border:'none'}}>Cambiar API key</button>
      </div>
      <Card style={{flex:1,display:'flex',flexDirection:'column',padding:0,overflow:'hidden'}}>
        <div style={{flex:1,overflowY:'auto',padding:20,display:'flex',flexDirection:'column',gap:10}}>
          {messages.map((m,i)=>(
            <div key={i} style={{display:'flex',justifyContent:m.role==='user'?'flex-end':'flex-start'}}>
              <div style={{maxWidth:'75%',padding:'10px 14px',borderRadius:m.role==='user'?'18px 18px 4px 18px':'18px 18px 18px 4px',background:m.role==='user'?'var(--primary)':'var(--surface2)',color:m.role==='user'?'#fff':'var(--text)',fontSize:13,lineHeight:1.6,whiteSpace:'pre-wrap',border:m.role==='user'?'none':'1px solid var(--border)'}}>
                {m.content}

          ))}
          {loading&&<div style={{display:'flex',justifyContent:'flex-start'}}>
            <div style={{background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:'18px 18px 18px 4px',padding:'10px 16px',display:'flex',gap:4}}>
              {[0,1,2].map(i=><div key={i} style={{width:6,height:6,borderRadius:'50%',background:'var(--text3)',animation:'bounce 1.2s infinite',animationDelay:`${i*0.2}s`}}/>)}
            </div>
          </div>}
          <div ref={endRef}/>

        <div style={{padding:14,borderTop:'1px solid var(--border)',display:'flex',gap:10}}>
          <Input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}}} placeholder="Preguntá sobre tus finanzas..." style={{flex:1}}/>
          <Btn onClick={send} disabled={loading||!input.trim()}>Enviar</Btn>
        </div>
      </Card>
      <style>{`@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-5px)}}`}</style>
    </div>
  );
}

// CONFIGURACIÓN
// ══════════════════════════════════════════════════════════════════════════
function Configuracion(){
  const [categories,setCategories]=useState([]);
  const [loading,setLoading]=useState(true);
  const [form,setForm]=useState({name:'',type:'expense'});
  const [saving,setSaving]=useState(false);
  const TC={expense:'var(--danger)',income:'var(--success)',transfer:'var(--primary)'};
  const TL={expense:'Gastos',income:'Ingresos',transfer:'Transferencias'};
  const load=async()=>{setLoading(true);const {data}=await sb.from('categories').select('*').order('type').order('name');setCategories(data||[]);setLoading(false);};
  useEffect(()=>{load();},[]);
  const add=async()=>{
    if(!form.name.trim())return;
    setSaving(true);await sb.from('categories').insert({name:form.name.trim(),type:form.type});
    setForm({name:'',type:'expense'});setSaving(false);load();
  };
  const del=async id=>{await sb.from('categories').delete().eq('id',id);load();};
  const grouped={expense:categories.filter(c=>c.type==='expense'),income:categories.filter(c=>c.type==='income'),transfer:categories.filter(c=>c.type==='transfer')};
  return(
    <div style={{display:'flex',flexDirection:'column',gap:16}}>
      <div><h1 style={{fontSize:20,fontWeight:700,letterSpacing:'-0.3px'}}>Configuración</h1><p style={{fontSize:13,color:'var(--text3)',marginTop:3}}>Administrá las categorías de tus transacciones</p></div>
      <Card>
        <CardHeader title="Nueva categoría"/>
        <div style={{display:'flex',gap:10,flexWrap:'wrap'}}>
          <Input placeholder="Nombre de la categoría" value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} onKeyDown={e=>e.key==='Enter'&&add()} style={{flex:'1 1 200px'}}/>
          <Select value={form.type} onChange={e=>setForm(f=>({...f,type:e.target.value}))} style={{width:'auto'}}>
            <option value="expense">Gasto</option><option value="income">Ingreso</option><option value="transfer">Transferencia</option>
          </Select>
          <Btn onClick={add} disabled={saving||!form.name.trim()} icon={Icons.plus}>{saving?'Guardando...':'Agregar'}</Btn>
        </div>
      </Card>
      {loading?<Loading/>:(
        <div style={{display:'flex',flexDirection:'column',gap:12}}>
          {['expense','income','transfer'].map(type=>grouped[type].length>0&&(
            <Card key={type} style={{padding:0,overflow:'hidden'}}>
              <div style={{padding:'12px 18px',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'center',gap:8}}>
                <div style={{width:7,height:7,borderRadius:'50%',background:TC[type]}}/>
                <span style={{fontWeight:600,fontSize:13,color:'var(--text)'}}>{TL[type]}</span>
                <span style={{fontSize:12,color:'var(--text3)'}}>({grouped[type].length})</span>
              </div>
              {grouped[type].map(cat=>(
                <div key={cat.id} style={{padding:'10px 18px',display:'flex',justifyContent:'space-between',alignItems:'center',borderBottom:'1px solid var(--border)'}}>
                  <span style={{fontSize:13,color:'var(--text)'}}>{cat.name}</span>
                  <button onClick={()=>del(cat.id)} style={{color:'var(--danger)',cursor:'pointer',background:'none',border:'none',display:'flex'}}>{Icons.trash}</button>
                </div>
              ))}
            </Card>
          ))}
        </div>
      )}
    </div>
  );
}



// Gráfico de línea con dimensiones reales (no SVG distorsionado)
function LineChartFull({data}){
  const [tooltip,setTooltip]=useState(null);
  const svgRef=useRef(null);
  const W=800, H=200, PAD={top:16,right:16,bottom:28,left:52};
  const chartW=W-PAD.left-PAD.right;
  const chartH=H-PAD.top-PAD.bottom;
  const n=data.length;
  if(!n)return<div style={{height:200,display:'flex',alignItems:'center',justifyContent:'center',color:'var(--text3)',fontSize:13}}>Sin datos</div>;

  const allVals=data.flatMap(d=>[d.income,d.expenses,Math.max(d.net,0)]);
  const maxVal=Math.max(...allVals,1);
  const step=n>1?chartW/(n-1):chartW;

  const xOf=i=>PAD.left+(n>1?i*chartW/(n-1):chartW/2);
  const yOf=v=>PAD.top+chartH-((v/maxVal)*chartH);

  const pts=(key)=>data.map((d,i)=>`${xOf(i)},${yOf(d[key]||0)}`).join(' ');
  const incPts=pts('income');
  const expPts=pts('expenses');
  const netPts=data.map((d,i)=>`${xOf(i)},${yOf(Math.max(d.net,0))}`).join(' ');

  // Y axis ticks
  const yTicks=[0,0.25,0.5,0.75,1].map(p=>({v:p*maxVal,y:yOf(p*maxVal)}));

  return(
    <div style={{position:'relative'}}>
      <svg ref={svgRef} width="100%" viewBox={`0 0 ${W} ${H}`} style={{overflow:'visible'}}
        onMouseMove={e=>{
          const rect=svgRef.current?.getBoundingClientRect();
          if(!rect)return;
          const mx=(e.clientX-rect.left)*(W/rect.width);
          const closest=data.reduce((best,d,i)=>Math.abs(xOf(i)-mx)<Math.abs(xOf(best.i)-mx)?{...d,i}:best,{...data[0],i:0});
          setTooltip({...closest,x:xOf(closest.i),y:H/2});
        }}
        onMouseLeave={()=>setTooltip(null)}>
        <defs>
          <linearGradient id="lgInc2" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor="#8470FF" stopOpacity="0.12"/>
            <stop offset="100%" stopColor="#8470FF" stopOpacity="0"/>
          </linearGradient>
          <linearGradient id="lgExp2" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor="#EB3838" stopOpacity="0.08"/>
            <stop offset="100%" stopColor="#EB3838" stopOpacity="0"/>
          </linearGradient>
        </defs>

        {/* Grid lines Y */}
        {yTicks.map((t,i)=>(
          <g key={i}>
            <line x1={PAD.left} y1={t.y} x2={W-PAD.right} y2={t.y} stroke="var(--border)" strokeWidth="0.8" strokeDasharray="4,3"/>
            <text x={PAD.left-6} y={t.y+4} textAnchor="end" fontSize="9" fill="var(--text3)">${(t.v/1000).toFixed(0)}k</text>
          </g>
        ))}

        {/* Area fills */}
        <polygon points={`${PAD.left},${yOf(0)} ${incPts} ${W-PAD.right},${yOf(0)}`} fill="url(#lgInc2)"/>
        <polygon points={`${PAD.left},${yOf(0)} ${expPts} ${W-PAD.right},${yOf(0)}`} fill="url(#lgExp2)"/>

        {/* Lines */}
        <polyline points={incPts} fill="none" stroke="#8470FF" strokeWidth="2" strokeLinejoin="round" strokeLinecap="round"/>
        <polyline points={expPts} fill="none" stroke="#EB3838" strokeWidth="2" strokeLinejoin="round" strokeLinecap="round"/>
        <polyline points={netPts} fill="none" stroke="#22c55e" strokeWidth="1.5" strokeLinejoin="round" strokeLinecap="round" strokeDasharray="5,3"/>

        {/* Dots */}
        {data.map((d,i)=>(
          <g key={i}>
            <circle cx={xOf(i)} cy={yOf(d.income)} r="3" fill="#8470FF" stroke="var(--surface)" strokeWidth="1.5"/>
            <circle cx={xOf(i)} cy={yOf(d.expenses)} r="3" fill="#EB3838" stroke="var(--surface)" strokeWidth="1.5"/>
          </g>
        ))}

        {/* Tooltip vertical line */}
        {tooltip&&<line x1={xOf(tooltip.i)} y1={PAD.top} x2={xOf(tooltip.i)} y2={H-PAD.bottom} stroke="var(--border2)" strokeWidth="1" strokeDasharray="3,2"/>}

        {/* X axis labels */}
        {data.map((d,i)=>(
          <text key={i} x={xOf(i)} y={H-6} textAnchor="middle" fontSize="10" fill="var(--text3)">{d.label}</text>
        ))}
      </svg>

      {/* Tooltip box */}
      {tooltip&&(
        <div style={{position:'absolute',top:20,left:`${(xOf(tooltip.i)/W)*100}%`,transform:'translateX(-50%)',background:'var(--surface)',border:'1px solid var(--border)',borderRadius:10,padding:'8px 12px',fontSize:12,pointerEvents:'none',whiteSpace:'nowrap',boxShadow:'0 4px 16px rgba(0,0,0,0.12)',zIndex:10}}>
          <div style={{fontWeight:600,color:'var(--text)',marginBottom:4}}>{tooltip.label}</div>
          <div style={{color:'#8470FF'}}>Ingresos: ${money(tooltip.income,0)}</div>
          <div style={{color:'#EB3838'}}>Gastos: ${money(tooltip.expenses,0)}</div>
          <div style={{color:'#22c55e',fontWeight:500}}>Neto: ${money(tooltip.net,0)}</div>
        </div>
      )}
    </div>
  );
}
